<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PCP Negotiation Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f2f5f9;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:15px;
width:100%;
border:none;
background:#0077ff;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:30px;
background:#eef3ff;
padding:20px;
border-radius:8px;
}

.warning{
color:#c62828;
font-weight:bold;
}

.good{
color:#2e7d32;
font-weight:bold;
}

canvas{
margin-top:30px;
}

</style>
</head>

<body>

<div class="container">

<h1>PCP Negotiation Analyzer</h1>

<div class="grid">

<div>
<label>Make</label>
<input id="make">

<label>Model</label>
<input id="model">

<label>Car Price (£)</label>
<input id="price" type="number">

<label>Car Year</label>
<select id="year"></select>

<label>Fuel Type</label>
<select id="fuel">
<option>Petrol</option>
<option>Diesel</option>
<option>Hybrid</option>
<option>Electric</option>
</select>

<label>Current Mileage</label>
<input id="mileage" type="number">

<label>Expected Annual Mileage</label>
<input id="annualMileage" type="number">

</div>

<div>

<label>Deposit (£)</label>
<input id="deposit" type="number">

<label>APR (%)</label>
<input id="apr" type="number">

<label>Term (months)</label>
<select id="term">
<option value="24">24</option>
<option value="36">36</option>
<option value="48">48</option>
<option value="60">60</option>
</select>

<label>Dealer Balloon Payment (£)</label>
<input id="balloon" type="number">

<label>Estimated Service History</label>
<select id="service">
<option>Full</option>
<option>Partial</option>
<option>Unknown</option>
</select>

</div>

</div>

<button onclick="analyze()">Analyze PCP Deal</button>

<div id="result" class="result"></div>

<canvas id="valueChart"></canvas>

</div>

<script>

for(let y=2026;y>=2005;y--){
let opt=document.createElement("option");
opt.value=y;
opt.text=y;
document.getElementById("year").appendChild(opt);
}

function depreciationRate(fuel){

switch(fuel){

case "Petrol":
return 0.15;

case "Diesel":
return 0.17;

case "Hybrid":
return 0.13;

case "Electric":
return 0.20;

default:
return 0.16;

}

}

function monthlyPayment(price,deposit,balloon,apr,months){

let principal = price - deposit - balloon;

let monthlyRate = apr/100/12;

let payment = principal * monthlyRate /
(1 - Math.pow(1+monthlyRate,-months));

return payment;

}

function analyze(){

let price = parseFloat(price.value);
let deposit = parseFloat(deposit.value);
let apr = parseFloat(apr.value);
let months = parseInt(term.value);
let balloon = parseFloat(balloon.value);
let fuel = fuel.value;
let annualMileage = parseFloat(annualMileage.value);

let rate = depreciationRate(fuel);

let years = months/12;

let predicted = price * Math.pow((1-rate),years);

let mileagePenalty = (annualMileage/10000)*0.03*years;

predicted = predicted*(1-mileagePenalty);

let monthly = monthlyPayment(price,deposit,balloon,apr,months);

let negotiation;

if(balloon > predicted){

negotiation =
`<span class="warning">
Dealer balloon appears HIGH by £${(balloon-predicted).toFixed(0)}.
Monthly payment may be artificially low.
</span>`;

}else{

negotiation =
`<span class="good">
Balloon value looks fair or conservative.
</span>`;

}

result.innerHTML = `

<h2>Deal Analysis</h2>

Predicted Value at End of Term: <b>£${predicted.toFixed(0)}</b><br><br>

Dealer Balloon Payment: <b>£${balloon}</b><br><br>

Estimated Monthly Payment: <b>£${monthly.toFixed(0)}</b><br><br>

${negotiation}

`;

drawChart(price,rate,years);

}

function drawChart(price,rate,years){

let labels=[];
let values=[];

for(let y=0;y<=years;y++){

labels.push("Year "+y);

values.push(price*Math.pow((1-rate),y));

}

new Chart(document.getElementById("valueChart"),{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Predicted Car Value",

data:values,

fill:false,

tension:0.1

}]

}

});

}

</script>

</body>
</html>
