<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PCP Negotiation Tool</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f2f5f9;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#0077ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#005cd4;
}

.result{
margin-top:30px;
padding:20px;
background:#eef4ff;
border-radius:8px;
}

.warning{
color:#c62828;
font-weight:bold;
}

.good{
color:#2e7d32;
font-weight:bold;
}

canvas{
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>PCP Negotiation Analyzer</h1>

<div class="grid">

<div>

<label>Year</label>
<select id="year"></select>

<label>Make</label>
<select id="make">
<option>Select make</option>
</select>

<label>Model</label>
<select id="model">
<option>Select model</option>
</select>

<label>Fuel Type</label>
<select id="fuel">
<option>Petrol</option>
<option>Diesel</option>
<option>Hybrid</option>
<option>Electric</option>
</select>

<label>Current Mileage</label>
<input id="mileage" type="number">

<label>Expected Annual Mileage</label>
<input id="annualMileage" type="number">

</div>

<div>

<label>Purchase Price (£)</label>
<input id="price" type="number">

<label>Deposit (£)</label>
<input id="deposit" type="number">

<label>APR (%)</label>
<input id="apr" type="number">

<label>Term (months)</label>
<select id="term">
<option>24</option>
<option>36</option>
<option>48</option>
<option>60</option>
</select>

<label>Dealer Balloon (£)</label>
<input id="balloon" type="number">

</div>

</div>

<button onclick="analyze()">Analyze PCP Deal</button>

<div id="result" class="result"></div>

<canvas id="valueChart"></canvas>

</div>

<script>

const yearSelect = document.getElementById("year");
const makeSelect = document.getElementById("make");
const modelSelect = document.getElementById("model");

for(let y=2026;y>=2000;y--){
let opt=document.createElement("option");
opt.value=y;
opt.text=y;
yearSelect.appendChild(opt);
}

async function loadMakes(){

let res = await fetch("https://www.carqueryapi.com/api/0.3/?cmd=getMakes");

let text = await res.text();
let json = JSON.parse(text.replace("?(", "").replace(");", ""));

makeSelect.innerHTML="<option>Select make</option>";

json.Makes.forEach(m=>{
let opt=document.createElement("option");
opt.value=m.make_display;
opt.text=m.make_display;
makeSelect.appendChild(opt);
});

}

async function loadModels(){

let make=makeSelect.value;
let year=yearSelect.value;

if(!make) return;

let url=`https://www.carqueryapi.com/api/0.3/?cmd=getModels&make=${make}&year=${year}`;

let res=await fetch(url);

let text=await res.text();

let json=JSON.parse(text.replace("?(", "").replace(");", ""));

modelSelect.innerHTML="<option>Select model</option>";

json.Models.forEach(m=>{
let opt=document.createElement("option");
opt.value=m.model_name;
opt.text=m.model_name;
modelSelect.appendChild(opt);
});

}

makeSelect.addEventListener("change",loadModels);
yearSelect.addEventListener("change",loadModels);

function depreciationRate(fuel){

switch(fuel){

case "Petrol":
return 0.15;

case "Diesel":
return 0.17;

case "Hybrid":
return 0.13;

case "Electric":
return 0.20;

default:
return 0.16;

}

}

function monthlyPayment(price,deposit,balloon,apr,months){

let principal = price - deposit - balloon;

let monthlyRate = apr/100/12;

let payment = principal * monthlyRate /
(1 - Math.pow(1+monthlyRate,-months));

return payment;

}

function analyze(){

let price=parseFloat(document.getElementById("price").value);
let deposit=parseFloat(document.getElementById("deposit").value);
let balloon=parseFloat(document.getElementById("balloon").value);
let apr=parseFloat(document.getElementById("apr").value);
let months=parseInt(document.getElementById("term").value);
let fuel=document.getElementById("fuel").value;
let annualMileage=parseFloat(document.getElementById("annualMileage").value || 0);

let rate=depreciationRate(fuel);

let years=months/12;

let predicted=price*Math.pow((1-rate),years);

let mileagePenalty=(annualMileage/10000)*0.03*years;

predicted=predicted*(1-mileagePenalty);

let monthly=monthlyPayment(price,deposit,balloon,apr,months);

let negotiation;

if(balloon>predicted){

negotiation=
`<span class="warning">
Dealer balloon appears HIGH by £${(balloon-predicted).toFixed(0)}.
Monthly payment may be artificially low.
</span>`;

}else{

negotiation=
`<span class="good">
Balloon value looks fair or conservative.
</span>`;

}

document.getElementById("result").innerHTML=`

<h2>Deal Analysis</h2>

Predicted Value After Term: <b>£${predicted.toFixed(0)}</b><br><br>

Dealer Balloon: <b>£${balloon}</b><br><br>

Estimated Monthly Payment: <b>£${monthly.toFixed(0)}</b><br><br>

${negotiation}

`;

drawChart(price,rate,years);

}

let chart;

function drawChart(price,rate,years){

let labels=[];
let values=[];

for(let y=0;y<=years;y++){

labels.push("Year "+y);
values.push(price*Math.pow((1-rate),y));

}

if(chart){
chart.destroy();
}

chart=new Chart(document.getElementById("valueChart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Predicted Car Value (£)",
data:values,
fill:false,
tension:0.1
}]
}

});

}

loadMakes();

</script>

</body>
</html>
